[package]
name = "nekoviewer"
version = "0.7.0"
edition = "2024"
license = "MIT"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.52", features = ["Win32_Storage_FileSystem"] }

[dependencies]
egui = "0.35"
egui-winit = "0.35"
egui-wgpu = { version = "0.35", features = ["winit"] }
winit = "0.30"
pollster = "0.4"
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "webp", "gif", "bmp"] }
libavif = "0.14"
libavif-sys = "0.17"
zip = "2"
flate2 = "1"
encoding_rs = "0.8"
walkdir = "2"
sha2 = "0.10"
fast_image_resize = "5"
webp = "0.3"
libwebp-sys = "0.9"
sysinfo = { version = "0.32", default-features = false, features = ["system"] }
redb = "4"

[profile.dev.package.fast_image_resize]
opt-level = 3

[profile.dev.package.image]
opt-level = 3

[patch.crates-io]
libdav1d-sys = { path = "local/libdav1d-sys" }
