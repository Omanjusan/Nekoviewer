[package]
name = "nekoviewer"
version = "1.0.0"
edition = "2024"
license = "MIT"

[profile.release]
strip = true
lto = true
codegen_units = 1

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.52", features = ["Win32_Storage_FileSystem", "Win32_UI_WindowsAndMessaging", "Win32_Foundation"] }

[dependencies]
egui = "0.35"
egui-winit = "0.35"
egui-wgpu = { version = "0.35", features = ["winit"] }
winit = "0.30"
pollster = "0.4"
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "webp", "gif", "bmp"] }
libavif = "0.14"
libavif-sys = "0.17"
zip = "2"
sevenz-rust2 = "0.21"
tar = "0.4"
flate2 = "1"
encoding_rs = "0.8"
glob = "0.3"
sha2 = "0.10"
fast_image_resize = "5"
webp = "0.3"
libwebp-sys = "0.9"
sysinfo = { version = "0.32", default-features = false, features = ["system"] }
redb = "4"

[profile.dev.package.fast_image_resize]
opt-level = 3

[profile.dev.package.image]
opt-level = 3

[patch.crates-io]
libdav1d-sys = { path = "local/libdav1d-sys" }
