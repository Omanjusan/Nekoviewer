name: Release

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]

jobs:
  release:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: nekoviewer-windows-x64
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Extract release notes
        run: |
          VERSION="${{ github.event.workflow_run.head_branch }}"
          VERSION="${VERSION#v}"
          # betaタグ(例: 1.0.0-beta.1)は開発中のベースバージョン(1.0.0)のCHANGELOG節を共用する
          BASE_VERSION="${VERSION%%-*}"
          awk "/^## \[${BASE_VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$TAG" == *-beta* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" nekoviewer.exe \
            --notes-file release_notes.md $PRERELEASE_FLAG
