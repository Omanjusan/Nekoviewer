name: Release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Find Build run for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          RUN_ID=$(gh run list \
            --workflow=build.yml \
            --commit "$SHA" \
            --status success \
            --json databaseId \
            --jq '.[0].databaseId')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::コミット $SHA に対応する成功済みBuild実行が見つからない"
            exit 1
          fi

          echo "RUN_ID=$RUN_ID" >> "$GITHUB_ENV"

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: nekoviewer-windows-x64
          run-id: ${{ env.RUN_ID }}
          github-token: ${{ github.token }}

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: nekoviewer-linux-x64
          run-id: ${{ env.RUN_ID }}
          github-token: ${{ github.token }}

      - name: Extract release notes
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} nekoviewer.exe nekoviewer \
            --notes-file release_notes.md
