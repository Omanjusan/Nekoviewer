name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      - name: Cache vcpkg dav1d
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: C:\vcpkg\packages\dav1d_x64-windows-static
          key: vcpkg-dav1d-x64-windows-static-v1

      - name: Install dav1d via vcpkg
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: C:\vcpkg\vcpkg.exe install dav1d:x64-windows-static

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            C:\cgt
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nekoviewer-windows-x64
          path: C:\cgt\release\nekoviewer.exe
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nekoviewer-windows-x64

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} nekoviewer.exe \
            --generate-notes
