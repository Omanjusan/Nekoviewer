name: Build

on:
  pull_request:
    branches: [develop, main]   # feat→dev、dev→mainのPR時にCI検証
  push:
    tags: ['v*']            # リリース用タグpush時にビルド&アーティファクト生成

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      VCPKG_ROOT: C:\vcpkg
      CARGO_TARGET_DIR: C:\cgt

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      - name: Cache vcpkg dav1d
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: C:\vcpkg\packages\dav1d_x64-windows-static
          key: vcpkg-dav1d-x64-windows-static-v1

      - name: Install dav1d via vcpkg
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: C:\vcpkg\vcpkg.exe install dav1d:x64-windows-static

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            C:\cgt
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: nekoviewer-windows-x64
          path: C:\cgt\release\nekoviewer.exe
          retention-days: 30

