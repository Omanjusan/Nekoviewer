name: Build

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      VCPKG_ROOT: C:\vcpkg
      CARGO_TARGET_DIR: C:\cgt

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      - name: Cache vcpkg dav1d
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: C:\vcpkg\packages\dav1d_x64-windows-static
          key: vcpkg-dav1d-x64-windows-static-v1

      - name: Install dav1d via vcpkg
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: C:\vcpkg\vcpkg.exe install dav1d:x64-windows-static

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            C:\cgt
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nekoviewer-windows-x64
          path: C:\cgt\release\nekoviewer.exe
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NASM and dav1d
        run: sudo apt-get update && sudo apt-get install -y nasm libdav1d-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nekoviewer-linux-x64
          path: target/release/nekoviewer
          retention-days: 30

  release:
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: nekoviewer-windows-x64

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: nekoviewer-linux-x64

      - name: Extract release notes
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} nekoviewer.exe nekoviewer \
            --notes-file release_notes.md
